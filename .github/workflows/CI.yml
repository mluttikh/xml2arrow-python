name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff check
        run: ruff check python/ --output-format=github
      - name: Run Ruff format
        run: ruff format python/ --check

  type-check:
    name: Type Check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install mypy pyarrow
      - name: Run mypy
        run: mypy

  test:
    name: Test
    needs: lint # Only run tests if linting passes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pip install maturin pytest pytest-cov
      - name: Build wheel
        run: maturin build --release --out dist
      - name: Install wheel
        run: pip install --find-links=dist xml2arrow
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=xml2arrow --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15
            target: x86_64
          - runner: macos-15
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # Pinned to Pyodide 0.27.7 — matches Marimo and pydantic-core, and is the
  # latest Pyodide release where `pyarrow` is enabled in pyodide-recipes (it
  # is `_disabled: true` on 0.28+ pending an ABI rebuild — see
  # pyodide/pyodide#4135). Bundled CPython is 3.12, bundled emscripten is
  # 3.1.58. Verify the emscripten pin with:
  #   curl -sL https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide-lock.json | jq .info.platform
  pyodide:
    name: Build Pyodide wheel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # wasm32-unknown-emscripten is a tier-3 target, so nightly + rust-src are
      # required. Pinned past the let_chains stabilization (Feb 26 2025) since
      # upstream `xml2arrow` uses them — pydantic-core's `nightly-2025-02-17`
      # pin is too old. Keep the pin close to pydantic-core's so the
      # emscripten 3.1.58 / Pyodide 0.27 toolchain stays well-trodden.
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-04-15
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.58"
          actions-cache-folder: emsdk-cache

      - name: Install maturin
        run: pip install 'maturin>=1.8,<2.0'

      - name: Build wheel
        run: maturin build --release --target wasm32-unknown-emscripten --out dist -i 3.12

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          # Distinct artifact name keeps this out of the release job's
          # `wheels-*/*` PyPI upload glob — PyPI rejects emscripten platform
          # tags. Distribute Pyodide wheels via GH releases or a CDN instead.
          name: wasm-wheels-pyodide-0.27
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [test, linux, musllinux, windows, macos, sdist, pyodide]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            wheels-*/*
            wasm-wheels-*/*
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
      # Pyodide wheel goes to the GitHub release instead of PyPI (PyPI rejects
      # the emscripten platform tag). softprops/action-gh-release creates the
      # release if it doesn't exist, otherwise appends the file.
      - name: Attach Pyodide wheel to GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: wasm-wheels-*/*
          fail_on_unmatched_files: true
